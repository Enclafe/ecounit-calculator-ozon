<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ECOUNIT — Калькулятор товаров</title>
    <link rel="icon" href="UNIT.png" type="image/png">
    <link rel="shortcut icon" href="UNIT.ico" type="image/x-icon">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        @font-face {
            font-family: 'Aerobus';
            src: url('fonts/Aerobus-Regular.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: swap;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: white; font-family: 'Inter', system-ui, 'Segoe UI', -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
        }
        .header { background-color: #34A853; padding: 0.8rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .header h1 {
            font-family: 'Aerobus', sans-serif;
            font-size: 2.5rem; font-weight: normal; color: white; margin: 0; letter-spacing: 1px;
        }
        .upload-btn {
            background: white; color: #34A853; border: none; padding: 8px 16px; border-radius: 4px;
            font-weight: 600; cursor: pointer; font-size: 0.9rem;
            font-family: inherit; text-decoration: none; display: inline-block;
        }
        .upload-btn:hover { background: #e8f5e9; }
        .table-container { flex: 1; overflow: auto; padding: 1rem; }
        .data-table {
            border-collapse: collapse; table-layout: fixed;
            width: max-content; min-width: 100%; font-size: 0.8rem;
        }
        .data-table th, .data-table td {
            border: 1px solid rgba(221, 221, 221, 0.25);
            padding: 0 4px;
            vertical-align: middle;
            height: 72px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-sizing: border-box;
        }

        /* Шапка-2 (названия) – базовый приоритет */
        .data-table th {
            background-color: #f1f3f4; font-weight: 600;
            position: sticky; top: 0; z-index: 30;
            border-bottom: 3px solid #ccc;
            height: 36px;
            line-height: 36px;
            text-align: center !important;
        }

        /* Шапка-1 (параметры) – самый низкий приоритет */
        .param-row th {
            z-index: 1;
            background-color: #f8f9fa;
            font-weight: normal;
            color: #333;
        }
        /* В закреплённых столбцах – прозрачная */
        .param-row th.sticky-left,
        .param-row th.sticky-col {
            background-color: transparent !important;
        }

        /* Обычные ячейки данных */
        .data-table td {
            z-index: 10;
        }

        /* Закреплённые столбцы (фото, название, маржа, рентабельность, корзина) */
        .sticky-left,
        .sticky-col,
        .data-table td:last-child {
            position: sticky;
            z-index: 25;
        }
        /* Шапка-2 в закреплённых столбцах – поверх всего */
        .data-table th.sticky-left,
        .data-table th.sticky-col {
            z-index: 40 !important;
            top: 0;
        }
        .data-table td.sticky-left,
        .data-table td.sticky-col,
        .data-table td:last-child {
            background-color: #fff;
            z-index: 25;
        }
        .row-red td:last-child {
            background-color: #ffcccc !important;
        }

        /* Убираем левое выравнивание заголовков */
        .data-table th:nth-child(2),
        .data-table th:nth-child(3),
        .data-table th.link-col {
            text-align: center !important;
        }
        .data-table td:nth-child(2),
        .data-table td:nth-child(3),
        .data-table td.link-col {
            text-align: left !important;
        }

        .data-table th:first-child, .data-table td:first-child {
            width: 72px !important; min-width: 72px !important; max-width: 72px !important;
            text-align: center;
            padding: 0;
        }
        .data-table td:first-child img {
            width: 64px; height: 64px;
            object-fit: cover;
            display: block; margin: 0 auto;
            border-radius: 16px;
        }
        .data-table th:nth-child(2), .data-table td:nth-child(2) {
            width: 150px !important; min-width: 150px !important; max-width: 150px !important;
            text-align: left;
            font-weight: 600;
        }
        .data-table td:nth-child(2) .editable-cell { font-weight: 600; }
        .data-table th.link-col, .data-table td.link-col {
            min-width: 60px !important;
            max-width: 80px !important;
        }
        .group-ozon { background-color: #005bff !important; color: white; }
        .group-1688 { background-color: #ff5b00 !important; color: white; }
        .group-wb { background-color: #e93acd !important; color: white; }

        .data-table td { vertical-align: middle; line-height: 1.2; }
        .data-table td .editable-cell,
        .data-table td .link-cell {
            display: flex;
            align-items: center;
            height: 72px;
            width: 100%;
            margin: 0;
            padding: 0;
            justify-content: inherit;
        }
        .data-table td .editable-cell { cursor: pointer; text-align: inherit; }
        .editable-cell input {
            width: 100%; height: 100%; border: none; background: transparent;
            font-family: inherit; font-size: inherit; margin: 0; padding: 0;
            outline: none; box-sizing: border-box; text-align: inherit; line-height: 1.2;
        }
        .link-cell { cursor: pointer; }
        .link-cell a {
            display: inline-block; text-decoration: none; color: #005bff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            max-width: 100%; line-height: 1.2;
        }
        .link-cell a:hover { text-decoration: underline; }
        .link-cell input {
            width: 100%; height: 100%; border: none; background: transparent;
            font-family: inherit; font-size: inherit; padding: 0; margin: 0;
            outline: none; box-sizing: border-box; line-height: 1.2;
        }
        .param-input { width: 35px; padding: 2px; border: 1px solid #ccc; border-radius: 3px; font-size: 0.7rem; text-align: center; display: inline-block; vertical-align: middle; }
        .data-table input[type="number"]::-webkit-inner-spin-button,
        .data-table input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .data-table input[type="number"] { -moz-appearance: textfield; }
        .footer {
            background-color: #f1f3f4; text-align: center; padding: 10px 2rem;
            font-size: 0.75rem; color: #555; border-top: 1px solid #ddd;
        }

        .row-red td { background-color: #ffcccc !important; }

        .delete-btn {
            background: none; border: none; cursor: pointer; font-size: 1.3rem;
            opacity: 0.7; transition: opacity 0.2s; display: flex;
            align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 0;
        }
        .delete-btn:hover { opacity: 1; }

        .data-table td:not(.link-col):not(:first-child):not(:nth-child(2)):not(:nth-child(3)):not(:last-child) .editable-cell {
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>ECOUNIT</h1>
    <div>
        <a class="upload-btn" id="ozonCalcBtn" href="https://calculator.ozon.ru/" target="_blank" style="margin-right: 8px;">OZON калькулятор</a>
        <button class="upload-btn" id="sppBtn" style="margin-right: 8px;">СПП</button>
        <button class="upload-btn" id="uploadDbBtn">Загрузить БД</button>
    </div>
</div>
<div class="table-container">
    <table class="data-table" id="mainTable">
        <thead id="tableHeader"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>
<div class="footer">© 2026 EGOR SH. Все права защищены.</div>

<script>
    // ========== Глобальные параметры ==========
    let globalParams = {
        ekvairingPercent: 0, crossDockingPercent: 0, logisticPercent: 5,
        lastMilePercent: 0, returnsPercent: 0, usdRate: 90, usdRateMarkup: 8,
        cnyRate: 12.5, cnyRateMarkup: 8, logisticTariff: 1.5,
        commission1688Percent: 0, brakPercent: 0, reklamaPercent: 0,
        upakovkaRub: 0, procheePercent: 0, nalogPercent: 0,
        sppDiscount: 0,
        sppPrices: ['', '', '', '', '', '']
    };

    let rowsData = [];
    const ROWS = 500;
    const STORAGE_KEY = 'ecounit_data';
    const DB_STORAGE_KEY = 'ecounit_db';

    let dbRows = [];
    let stickyRightOffsets = {};

    function saveDbToStorage() { localStorage.setItem(DB_STORAGE_KEY, JSON.stringify(dbRows)); }
    function loadDbFromStorage() {
        const saved = localStorage.getItem(DB_STORAGE_KEY);
        if (saved) { try { dbRows = JSON.parse(saved); } catch (e) {} }
    }
    function parseExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheet];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (jsonData.length > 0) {
                dbRows = [];
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row || row.length === 0) continue;
                    dbRows.push({
                        categoryA: row[0] || '',
                        typeB: row[1] || '',
                        commE: parseFloat(row[4]) || 0,
                        commF: parseFloat(row[5]) || 0,
                        commG: parseFloat(row[6]) || 0,
                        commH: parseFloat(row[7]) || 0
                    });
                }
                saveDbToStorage();
                alert(`БД загружена: ${dbRows.length} записей.`);
                recalcAllRows();
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function saveToStorage() {
        const data = {
            globalParams: globalParams,
            rows: rowsData.map(row => ({
                name: row.name, category: row.category, link: row.link,
                price: row.price, commissionManual: row.commissionManual,
                purchaseCNY: row.purchaseCNY, weight: row.weight,
                link1688: row.link1688, reklamaPercentLocal: row.reklamaPercentLocal,
                upakovkaRubLocal: row.upakovkaRubLocal, photo: row.photo,
                showDefaultValues: row.showDefaultValues
            }))
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return false;
        try {
            const data = JSON.parse(saved);
            if (data.globalParams) {
                globalParams = { ...globalParams, ...data.globalParams };
                if (!globalParams.sppPrices || globalParams.sppPrices.length !== 6) {
                    globalParams.sppPrices = ['', '', '', '', '', ''];
                }
            }
            if (data.rows && Array.isArray(data.rows)) {
                initRows();
                data.rows.forEach((savedRow, idx) => {
                    if (idx < rowsData.length) Object.assign(rowsData[idx], savedRow);
                });
            }
            return true;
        } catch (e) { console.warn('Ошибка загрузки', e); return false; }
    }

    function initRows() {
        rowsData = [];
        for (let i = 0; i < ROWS; i++) {
            rowsData.push({
                id: i, photo: '', name: '', category: '', link: '', price: 0,
                commissionManual: null, commissionLeftValue: 0, commissionRub: 0,
                ekvRub: 0, crossRub: 0, logisticsRub: 0, lastMileRub: 0, returnsRub: 0,
                ozonExpenses: 0, link1688: '', purchaseCNY: 0, purchaseRub: 0, weight: 0,
                logisticUSD: 0, logisticRub1688: 0, comm1688Rub: 0, brakRub: 0, costPrice: 0,
                reklamaPercentLocal: null, reklamaRub: 0, upakovkaRubLocal: null, procheeRub: 0,
                totalExpensesWB: 0, directExpenses: 0, profit: 0, nalogRub: 0, netProfit: 0,
                margin: 0, rent: 0, showDefaultValues: false
            });
        }
    }

    async function fetchExchangeRates() {
        try {
            const res = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
            const data = await res.json();
            globalParams.usdRate = data.Valute.USD.Value;
            globalParams.cnyRate = data.Valute.CNY.Value;
            saveToStorage();
        } catch (e) {}
    }

    function formatCurrency(v) { return (v === 0 || isNaN(v) || v === null) ? '' : Math.round(v) + ' ₽'; }
    function formatPercent(v) { return (v === 0 || isNaN(v) || v === null) ? '' : v + ' %'; }
    function formatDollar(v) { return (v === 0 || isNaN(v) || v === null) ? '' : v.toFixed(2) + ' $'; }

    function findCommission(categoryShort, price) {
        if (!categoryShort || !dbRows || dbRows.length === 0) return null;
        if (price <= 300) return null;
        let row = dbRows.find(r => r.typeB && r.typeB.toLowerCase() === categoryShort.toLowerCase());
        if (!row) row = dbRows.find(r => r.typeB && r.typeB.toLowerCase().includes(categoryShort.toLowerCase()));
        if (!row) row = dbRows.find(r => r.categoryA && r.categoryA.toLowerCase().includes(categoryShort.toLowerCase()));
        if (!row) return null;
        let comm = 0;
        if (price <= 1500) comm = row.commE;
        else if (price <= 5000) comm = row.commF;
        else if (price <= 10000) comm = row.commG;
        else comm = row.commH;
        if (comm > 0 && comm <= 1) {
            comm = Math.round(comm * 100);
        }
        console.log(`[DB] Найдена комиссия для "${categoryShort}": ${comm}% (цена ${price}₽)`);
        return comm || null;
    }

    function recalcRow(idx) {
        const r = rowsData[idx];
        const price = parseFloat(r.price) || 0;
        if (!price) {
            r.commissionRub = r.ekvRub = r.crossRub = r.logisticsRub = r.lastMileRub = r.returnsRub = r.ozonExpenses = 0;
            r.purchaseRub = r.logisticUSD = r.logisticRub1688 = r.comm1688Rub = r.brakRub = r.costPrice = 0;
            r.reklamaRub = r.procheeRub = r.totalExpensesWB = r.directExpenses = r.profit = r.nalogRub = r.netProfit = r.margin = r.rent = 0;
            return;
        }
        let comm;
        if (price <= 100) comm = 14;
        else if (price <= 300) comm = 20;
        else comm = (r.commissionManual != null && !isNaN(r.commissionManual)) ? parseFloat(r.commissionManual) : 0;
        r.commissionLeftValue = comm;
        r.commissionRub = price * comm / 100;

        r.ekvRub = price * globalParams.ekvairingPercent / 100;
        r.crossRub = price * globalParams.crossDockingPercent / 100;
        let logP = globalParams.logisticPercent;
        r.logisticsRub = (price <= 300) ? 21 + price * logP / 100 : 80 + price * logP / 100;
        r.lastMileRub = price * globalParams.lastMilePercent / 100;
        r.returnsRub = price * globalParams.returnsPercent / 100;
        r.ozonExpenses = r.commissionRub + r.ekvRub + r.crossRub + r.logisticsRub + r.lastMileRub + r.returnsRub;

        let purchaseCNY = parseFloat(r.purchaseCNY) || 0;
        r.purchaseRub = purchaseCNY * (globalParams.cnyRate * (1 + globalParams.cnyRateMarkup / 100));

        let weightKg = (parseFloat(r.weight) || 0) / 1000;
        r.logisticUSD = weightKg * globalParams.logisticTariff;
        r.logisticRub1688 = r.logisticUSD * (globalParams.usdRate * (1 + globalParams.usdRateMarkup / 100));

        r.comm1688Rub = r.purchaseRub * globalParams.commission1688Percent / 100;
        r.brakRub = r.purchaseRub * globalParams.brakPercent / 100;
        r.costPrice = r.purchaseRub + r.logisticRub1688 + r.comm1688Rub + r.brakRub;

        let reklamaPercent = (r.reklamaPercentLocal != null && !isNaN(r.reklamaPercentLocal)) ? parseFloat(r.reklamaPercentLocal) : globalParams.reklamaPercent;
        r.reklamaRub = price * reklamaPercent / 100;

        let upakovkaRub = (r.upakovkaRubLocal != null && !isNaN(r.upakovkaRubLocal)) ? parseFloat(r.upakovkaRubLocal) : globalParams.upakovkaRub;
        r.procheeRub = price * globalParams.procheePercent / 100;
        r.totalExpensesWB = r.ozonExpenses + r.costPrice + r.reklamaRub + upakovkaRub + r.procheeRub;
        r.directExpenses = r.costPrice + upakovkaRub + r.procheeRub;
        r.profit = price - r.totalExpensesWB;
        r.nalogRub = price * globalParams.nalogPercent / 100;
        r.netProfit = r.profit - r.nalogRub;
        r.margin = (price !== 0) ? (r.netProfit / price) * 100 : 0;
        if (r.directExpenses !== 0) r.rent = (r.netProfit / r.directExpenses) * 100;
        else r.rent = 0;
    }

    function recalcAllRows() {
        for (let i = 0; i < ROWS; i++) recalcRow(i);
        for (let i = 0; i < ROWS; i++) if (rowsDOM[i]) updateRowDisplay(i);
    }

    window.addItemFromExtension = function(item) {
        const cleanPrice = String(item.price || '').replace(/\s/g, '').replace(',', '.');
        let numericPrice = parseFloat(cleanPrice) || 0;

        if (globalParams.sppDiscount > 0 && numericPrice > 0) {
            let corrected = numericPrice / (1 - globalParams.sppDiscount / 100);
            corrected = Math.round(corrected);
            if (corrected >= 300 && corrected <= 400) corrected = 300;
            numericPrice = corrected;
        }

        const emptyRow = rowsData.find(r => !r.link);
        if (!emptyRow) return;
        emptyRow.photo = item.photoUrl || '';
        emptyRow.name = item.name || '';
        emptyRow.link = item.url || '';
        emptyRow.price = numericPrice;
        emptyRow.category = item.categoryShort || '';
        emptyRow.purchaseCNY = 0;
        emptyRow.weight = item.weight || 0;
        emptyRow.showDefaultValues = true;

        if (emptyRow.category && numericPrice > 300) {
            const dbCommission = findCommission(emptyRow.category, numericPrice);
            if (dbCommission !== null) emptyRow.commissionManual = dbCommission;
        }

        recalcRow(emptyRow.id);
        const idx = rowsData.findIndex(r => r.id === emptyRow.id);
        if (rowsDOM[idx]) updateRowDisplay(idx);
        saveToStorage();
    };

    window.updateWeightsFromCart = function(products) {
        products.forEach(product => {
            const row = rowsData.find(r => r.name && r.name.trim().toLowerCase() === product.name.trim().toLowerCase());
            if (row) {
                row.weight = product.weight;
                recalcRow(row.id);
                const idx = rowsData.findIndex(r => r.id === row.id);
                if (rowsDOM[idx]) updateRowDisplay(idx);
            }
        });
        saveToStorage();
    };

    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'ECOUNIT_ADD_ITEM') {
            if (typeof window.addItemFromExtension === 'function') window.addItemFromExtension(event.data.item);
        }
        if (event.data && event.data.type === 'ECOUNIT_UPDATE_WEIGHTS') {
            if (typeof window.updateWeightsFromCart === 'function') window.updateWeightsFromCart(event.data.items);
        }
    });

    function deleteRow(idx) {
        for (let i = idx; i < ROWS - 1; i++) Object.assign(rowsData[i], rowsData[i + 1]);
        Object.assign(rowsData[ROWS - 1], createEmptyRow());
        rowsData[ROWS - 1].id = ROWS - 1;
        for (let i = idx; i < ROWS; i++) {
            recalcRow(i);
            if (rowsDOM[i]) updateRowDisplay(i);
        }
        saveToStorage();
    }

    function clearAllRows() {
        if (!confirm('Удалить ВСЕ товары?')) return;
        for (let i = 0; i < ROWS; i++) {
            Object.assign(rowsData[i], createEmptyRow());
            rowsData[i].id = i;
            recalcRow(i);
            if (rowsDOM[i]) updateRowDisplay(i);
        }
        saveToStorage();
    }

    function createEmptyRow() {
        return {
            id: -1, photo: '', name: '', category: '', link: '', price: 0,
            commissionManual: null, commissionLeftValue: 0, commissionRub: 0,
            ekvRub: 0, crossRub: 0, logisticsRub: 0, lastMileRub: 0, returnsRub: 0,
            ozonExpenses: 0, link1688: '', purchaseCNY: 0, purchaseRub: 0, weight: 0,
            logisticUSD: 0, logisticRub1688: 0, comm1688Rub: 0, brakRub: 0, costPrice: 0,
            reklamaPercentLocal: null, reklamaRub: 0, upakovkaRubLocal: null, procheeRub: 0,
            totalExpensesWB: 0, directExpenses: 0, profit: 0, nalogRub: 0, netProfit: 0,
            margin: 0, rent: 0, showDefaultValues: false
        };
    }

    const columns = [
        { group: "ozon", mainTitle: "Фото", paramType: null },
        { group: "ozon", mainTitle: "Название", paramType: null },
        { group: "ozon", mainTitle: "Категория", paramType: null },
        { group: "ozon", mainTitle: "Ссылка", paramType: null },
        { group: "ozon", mainTitle: "Цена", paramType: null },
        { group: "ozon", mainTitle: "Комиссия", paramType: null },
        { group: "ozon", mainTitle: "Комиссия", paramType: null },
        { group: "ozon", mainTitle: "Эквайринг", paramType: "percent", paramId: "ekvairingPercent" },
        { group: "ozon", mainTitle: "Эквайринг", paramType: null },
        { group: "ozon", mainTitle: "Кросс-докинг", paramType: "percent", paramId: "crossDockingPercent" },
        { group: "ozon", mainTitle: "Кросс-докинг", paramType: null },
        { group: "ozon", mainTitle: "Логистика", paramType: "percent", paramId: "logisticPercent" },
        { group: "ozon", mainTitle: "Последняя миля", paramType: "percent", paramId: "lastMilePercent" },
        { group: "ozon", mainTitle: "Последняя миля", paramType: null },
        { group: "ozon", mainTitle: "Возвраты и отмены", paramType: "percent", paramId: "returnsPercent" },
        { group: "ozon", mainTitle: "Возвраты и отмены", paramType: null },
        { group: "ozon", mainTitle: "Расходы на Ozon", paramType: null },
        { group: "1688", mainTitle: "Ссылка", paramType: null },
        { group: "1688", mainTitle: "Закупочная цена", paramType: null },
        { group: "1688", mainTitle: "Закупочная цена", paramType: "cny" },
        { group: "1688", mainTitle: "Вес", paramType: null },
        { group: "1688", mainTitle: "Логистика", paramType: "tariff", paramId: "logisticTariff" },
        { group: "1688", mainTitle: "Логистика", paramType: "usd" },
        { group: "1688", mainTitle: "Комиссия", paramType: "percent", paramId: "commission1688Percent" },
        { group: "1688", mainTitle: "Комиссия", paramType: null },
        { group: "1688", mainTitle: "Брак", paramType: "percent", paramId: "brakPercent" },
        { group: "1688", mainTitle: "Брак", paramType: null },
        { group: "1688", mainTitle: "Себестоимость", paramType: null },
        { group: "wb", mainTitle: "Реклама", paramType: "percent", paramId: "reklamaPercent" },
        { group: "wb", mainTitle: "Реклама", paramType: null },
        { group: "wb", mainTitle: "Упаковка", paramType: "rub", paramId: "upakovkaRub" },
        { group: "wb", mainTitle: "Прочее", paramType: "percent", paramId: "procheePercent" },
        { group: "wb", mainTitle: "Прочее", paramType: null },

    function buildHeader() {
        const thead = document.getElementById('tableHeader');
        thead.innerHTML = '';

        const rowParams = document.createElement('tr');
        rowParams.classList.add('param-row');
        let i = 0;
        while (i < columns.length) {
            const col = columns[i];
            let span = 1;
            while (i + span < columns.length && columns[i + span].mainTitle === col.mainTitle) span++;
            const th = document.createElement('th');
            th.style.backgroundColor = '#f8f9fa';
            if (span > 1) th.colSpan = span;
            if (i === 0) {
                th.classList.add('sticky-left');
                th.style.left = '0px';
            } else if (i === 1) {
                th.classList.add('sticky-left');
                th.style.left = '72px';
            } else if (i >= columns.length - 3) {
                th.classList.add('sticky-col');
                th.setAttribute('data-col-index', i);
            }
            const paramCol = columns.slice(i, i + span).find(c => c.paramType && c.paramId);
            if (paramCol) {
                const wrapper = document.createElement('div');
                const input = document.createElement('input');
                input.type = 'number'; input.step = '0.1';
                input.value = globalParams[paramCol.paramId] === 0 ? '' : globalParams[paramCol.paramId];
                input.classList.add('param-input');
                input.addEventListener('change', e => {
                    let val = parseFloat(e.target.value);
                    if (isNaN(val)) val = 0;
                    globalParams[paramCol.paramId] = val;
                    recalcAllRows();
                    saveToStorage();
                    if (globalParams[paramCol.paramId] === 0) e.target.value = '';
                });
                wrapper.appendChild(input);
                if (paramCol.paramType === 'percent') wrapper.appendChild(document.createTextNode(' %'));
                else if (paramCol.paramType === 'rub') wrapper.appendChild(document.createTextNode(' ₽'));
                else if (paramCol.paramType === 'tariff') wrapper.appendChild(document.createTextNode(' $/кг'));
                th.appendChild(wrapper);
            } else {
                th.textContent = '';
            }
            rowParams.appendChild(th);
            i += span;
        }
        thead.appendChild(rowParams);

        const rowNames = document.createElement('tr');
        const titleCells = [];
        i = 0;
        while (i < columns.length) {
            const currentMain = columns[i].mainTitle;
            let span = 1, j = i + 1;
            while (j < columns.length && columns[j].mainTitle === currentMain) { span++; j++; }
            const th = document.createElement('th');
            th.textContent = currentMain;
            if (span > 1) th.colSpan = span;
            if (columns[i].group === 'ozon') th.classList.add('group-ozon');
            else if (columns[i].group === '1688') th.classList.add('group-1688');
            else if (columns[i].group === 'wb') th.classList.add('group-wb');
            if (i === 3 || i === 17) th.classList.add('link-col');

            if (i === 0) {
                th.classList.add('sticky-left');
                th.style.left = '0px';
            } else if (i === 1) {
                th.classList.add('sticky-left');
                th.style.left = '72px';
            } else if (i === 38 || i === 39 || i === 40) {
                th.classList.add('sticky-col');
                th.setAttribute('data-col-index', i);
            }

            if (i === columns.length - 1) {
                th.innerHTML = '';
                th.style.textAlign = 'center';
                const clearBtn = document.createElement('button');
                clearBtn.className = 'delete-btn';
                clearBtn.textContent = '🗑️';
                clearBtn.title = 'Очистить все товары';
                clearBtn.style.fontSize = '1.2rem';
                clearBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    clearAllRows();
                });
                th.appendChild(clearBtn);
            }
            titleCells.push({th, start: i, end: i + span - 1, span});
            rowNames.appendChild(th);
            i = j;
        }
        thead.appendChild(rowNames);

        const table = document.getElementById('mainTable');
        const colgroup = document.createElement('colgroup');
        const colWidths = new Array(columns.length).fill(75);
        colWidths[0] = 72;
        colWidths[1] = 150;
        colWidths[2] = 100;
        colWidths[columns.length - 1] = 46;
        const linkIndices = [3, 17];

        const measureEl = document.createElement('span');
        measureEl.style.font = '600 0.8rem "Inter", system-ui, sans-serif';
        measureEl.style.whiteSpace = 'nowrap';
        measureEl.style.position = 'absolute';
        measureEl.style.visibility = 'hidden';
        measureEl.style.display = 'inline-block';
        document.body.appendChild(measureEl);

        titleCells.forEach(({th, start, end, span}) => {
            if (start === 0 || start === 1 || start === 2 || linkIndices.includes(start) || start === columns.length - 1) return;
            measureEl.textContent = th.textContent;
            const textWidth = measureEl.offsetWidth + 20;
            const totalWidth = Math.max(textWidth, 100);
            const perCol = Math.ceil(totalWidth / span);
            for (let k = start; k <= end; k++) colWidths[k] = perCol;
        });

        colWidths.forEach((w, idx) => {
            const col = document.createElement('col');
            if (linkIndices.includes(idx)) col.style.width = 'auto';
            else col.style.width = w + 'px';
            colgroup.appendChild(col);
        });
        document.body.removeChild(measureEl);
        table.insertBefore(colgroup, table.firstChild);

        const lastIdx = columns.length - 1;
        stickyRightOffsets[lastIdx] = 0;
        stickyRightOffsets[lastIdx - 1] = colWidths[lastIdx];
        stickyRightOffsets[lastIdx - 2] = colWidths[lastIdx] + colWidths[lastIdx - 1];

        document.querySelectorAll('.sticky-col[data-col-index]').forEach(th => {
            const idx = parseInt(th.getAttribute('data-col-index'), 10);
            if (stickyRightOffsets[idx] !== undefined) {
                th.style.right = stickyRightOffsets[idx] + 'px';
            }
        });
    }

        const lastIdx = columns.length - 1;
        for (let i = 0; i < ROWS; i++) {
            const tr = document.createElement('tr');

            for (let j = 0; j < columns.length; j++) {

    // ========== Вспомогательные функции ==========
    function createEditableNumber(value, onSave, showZero = false) {
        const div = document.createElement('div'); div.className = 'editable-cell';
        const displayVal = (value === 0 && showZero) ? '0' : ((value === 0 || value === null || value === '') ? '' : value);
        div.textContent = displayVal;
        div.addEventListener('click', e => {
            e.stopPropagation(); if (div.querySelector('input')) return;
            const input = document.createElement('input'); input.type = 'number'; input.step = 'any';
            input.value = (value === 0 || value === null) ? '' : value;
            div.innerHTML = ''; div.appendChild(input); input.focus();
            const save = () => { onSave(input.value); };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', ev => {
                if (ev.key === 'Enter') save();
                else if (ev.key === 'Tab') { ev.preventDefault(); save(); moveToNextEditableCell(div, 1); }
            });
            document.addEventListener('click', function h(ev) { if (!div.contains(ev.target)) { save(); document.removeEventListener('click', h); } });
        });
        return div;
    }

    function moveToNextEditableCell(currentDiv, direction) {
        const td = currentDiv.closest('td'); if (!td) return;
        const tr = td.parentNode; if (!tr) return;
        const cells = Array.from(tr.cells); let idx = cells.indexOf(td); if (idx === -1) return;
        for (let step = 1; step <= cells.length; step++) {
            let nextIdx = idx + direction * step;
            if (nextIdx < 0 || nextIdx >= cells.length) break;
            const nextTd = cells[nextIdx];
            const editableDiv = nextTd.querySelector('.editable-cell, .link-cell');
            if (editableDiv) { editableDiv.click(); const input = editableDiv.querySelector('input'); if (input) input.focus(); break; }
        }
    }

            saveToStorage();
        };
        leftInputs.forEach(inp => inp.addEventListener('input', saveFields));
        rightInputs.forEach(inp => inp.addEventListener('input', saveFields));

        document.getElementById('sppCalculate').addEventListener('click', () => {
            const discounts = [];
            for (let i = 0; i < leftInputs.length; i++) {
                const left = parseFloat(leftInputs[i].value);
                const right = parseFloat(rightInputs[i].value);
                if (!isNaN(left) && left > 0 && !isNaN(right) && right > 0) {
                    const exact = ((left - right) / left) * 100;
                    discounts.push(Math.round(exact)); // округление до целого по математике
                }
            }
            if (discounts.length === 0) {
                globalParams.sppDiscount = 0;
                document.getElementById('sppResult').textContent = 'Средняя скидка: 0%';
            } else {
                const sum = discounts.reduce((a,b) => a+b, 0);
                const avg = sum / discounts.length;
                globalParams.sppDiscount = Math.floor(avg); // округление вниз до целого
                document.getElementById('sppResult').textContent = `Средняя скидка: ${Math.floor(avg)}%`;
            }
            saveFields();
            saveToStorage();
            modal.style.display = 'none';
        });

        document.getElementById('sppClose').addEventListener('click', () => {
            saveFields();
            modal.style.display = 'none';
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                saveFields();
                modal.style.display = 'none';
            }
        });

        return modal;
    }

    async function init() {
        loadDbFromStorage();
        const loaded = loadFromStorage();
        if (!loaded) initRows();
        await fetchExchangeRates();
        buildHeader();
        recalcAllRows();
        buildBody();

        document.getElementById('uploadDbBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx,.xls';
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) parseExcel(file);
            });
            input.click();
        });

        const sppModal = createSppModal();
        document.getElementById('sppBtn').addEventListener('click', () => {
            const lefts = sppModal.querySelectorAll('.spp-left');
            const rights = sppModal.querySelectorAll('.spp-right');
            for (let i = 0; i < 6; i++) {
                const input = i % 2 === 0 ? lefts[i/2] : rights[(i-1)/2];
                if (input) input.value = globalParams.sppPrices[i] || '';
            }
            sppModal.style.display = 'flex';
        });
    }

    init();
</script>
</body>
</html>
